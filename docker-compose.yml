services:

  # ─────────────────────────────────────────
  # POSTGRES (single instance, multiple DBs)
  # ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: monicahire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: monicahire
      POSTGRES_PASSWORD: monicahire_secret
      POSTGRES_DB: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/init.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - monicahire-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monicahire"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # ZOOKEEPER
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: monicahire-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - monicahire-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # KAFKA
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: monicahire-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - monicahire-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────
  # KAFKA UI (dev convenience)
  # ─────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: monicahire-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: monicahire-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - monicahire-network

  # ─────────────────────────────────────────
  # OLLAMA (local embeddings)
  # ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: monicahire-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - monicahire-network
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # MONICA AI (FastAPI)
  # ─────────────────────────────────────────
  monica-ai:
    build: ./monica-ai
    container_name: monicahire-monica-ai
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./monica-ai:/app
    environment:
      PGVECTOR_URL: postgresql+asyncpg://monicahire:monicahire_secret@postgres:5432/monica_ai_db
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_MODEL: deepseek-chat
    networks:
      - monicahire-network

  # ─────────────────────────────────────────
  # API GATEWAY
  # ─────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: monicahire-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      JOB_SERVICE_URL: http://job-service:8083
      CANDIDATE_SERVICE_URL: http://candidate-service:8084
      INTERVIEW_SERVICE_URL: http://interview-service:8085
      SUBSCRIPTION_SERVICE_URL: http://subscription-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      FILE_SERVICE_URL: http://file-service:8088
      REPORT_SERVICE_URL: http://report-service:8089
    networks:
      - monicahire-network

  # ─────────────────────────────────────────
  # AUTH SERVICE
  # ─────────────────────────────────────────
  auth-service:
    build: ./auth-service
    container_name: monicahire-auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: monicahire
      SPRING_DATASOURCE_PASSWORD: monicahire_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - monicahire-network

  # ─────────────────────────────────────────
  # USER SERVICE
  # ─────────────────────────────────────────
  user-service:
    build: ./user-service
    container_name: monicahire-user-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: monicahire
      SPRING_DATASOURCE_PASSWORD: monicahire_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MONICA_AI_URL: http://monica-ai:8000
    networks:
      - monicahire-network

  # ─────────────────────────────────────────
  # JOB SERVICE
  # ─────────────────────────────────────────
  job-service:
    build: ./job-service
    container_name: monicahire-job-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/job_db
      SPRING_DATASOURCE_USERNAME: monicahire
      SPRING_DATASOURCE_PASSWORD: monicahire_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SUBSCRIPTION_SERVICE_URL: http://subscription-service:8086
      MONICA_AI_URL: http://monica-ai:8000
    networks:
      - monicahire-network

  # ─────────────────────────────────────────
  # CANDIDATE SERVICE
  # ─────────────────────────────────────────
  candidate-service:
    build: ./candidate-service
    container_name: monicahire-candidate-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/candidate_db
      SPRING_DATASOURCE_USERNAME: monicahire
      SPRING_DATASOURCE_PASSWORD: monicahire_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JOB_SERVICE_URL: http://job-service:8083
      INTERVIEW_SERVICE_URL: http://interview-service:8085
      MONICA_AI_URL: http://monica-ai:8000
    networks:
      - monicahire-network

  # ─────────────────────────────────────────
  # INTERVIEW SERVICE
  # ─────────────────────────────────────────
  interview-service:
    build: ./interview-service
    container_name: monicahire-interview-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interview_db
      SPRING_DATASOURCE_USERNAME: monicahire
      SPRING_DATASOURCE_PASSWORD: monicahire_secret
      INTERVIEW_TOKEN_EXPIRY_HOURS: 72
    networks:
      - monicahire-network

  # ─────────────────────────────────────────
  # SUBSCRIPTION SERVICE
  # ─────────────────────────────────────────
  subscription-service:
    build: ./subscription-service
    container_name: monicahire-subscription-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/subscription_db
      SPRING_DATASOURCE_USERNAME: monicahire
      SPRING_DATASOURCE_PASSWORD: monicahire_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - monicahire-network

  # ─────────────────────────────────────────
  # NOTIFICATION SERVICE
  # ─────────────────────────────────────────
  notification-service:
    build: ./notification-service
    container_name: monicahire-notification-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL}
      BREVO_SENDER_NAME: MonicaHire
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - monicahire-network

  # ─────────────────────────────────────────
  # FILE SERVICE
  # ─────────────────────────────────────────
  file-service:
    build: ./file-service
    container_name: monicahire-file-service
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    networks:
      - monicahire-network

  # ─────────────────────────────────────────
  # REPORT SERVICE
  # ─────────────────────────────────────────
  report-service:
    build: ./report-service
    container_name: monicahire-report-service
    restart: unless-stopped
    ports:
      - "8089:8089"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/report_db
      SPRING_DATASOURCE_USERNAME: monicahire
      SPRING_DATASOURCE_PASSWORD: monicahire_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SUBSCRIPTION_SERVICE_URL: http://subscription-service:8086
      CANDIDATE_SERVICE_URL: http://candidate-service:8084
      MONICA_AI_URL: http://monica-ai:8000
      FILE_SERVICE_URL: http://file-service:8088
    networks:
      - monicahire-network

# ─────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────
volumes:
  postgres_data:
  pgvector_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  ollama_data:

# ─────────────────────────────────────────
# NETWORK
# ─────────────────────────────────────────
networks:
  monicahire-network:
    driver: bridge