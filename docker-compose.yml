services:

  # ─────────────────────────────────────────
  # POSTGRES (single instance, multiple DBs)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: monicahire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: monicahire
      POSTGRES_PASSWORD: monicahire_secret
      POSTGRES_DB: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - monicahire-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monicahire"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # PGVECTOR (for monica-ai RAG)
  # ─────────────────────────────────────────
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: monicahire-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: monicahire
      POSTGRES_PASSWORD: monicahire_secret
      POSTGRES_DB: monica_ai_db
    ports:
      - "5436:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - monicahire-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monicahire"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # ZOOKEEPER
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: monicahire-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - monicahire-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # KAFKA
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: monicahire-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - monicahire-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────
  # KAFKA UI (dev convenience)
  # ─────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: monicahire-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: monicahire-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - monicahire-network

  # ─────────────────────────────────────────
  # OLLAMA (local embeddings)
  # ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: monicahire-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - monicahire-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

# ─────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────
volumes:
  postgres_data:
  pgvector_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  ollama_data:

# ─────────────────────────────────────────
# NETWORK
# ─────────────────────────────────────────
networks:
  monicahire-network:
    driver: bridge