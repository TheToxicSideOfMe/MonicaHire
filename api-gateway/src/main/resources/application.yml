server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1

            - id: user-service
              uri: ${USER_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1

            - id: job-service
              uri: ${JOB_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/jobs/**
              filters:
                - StripPrefix=1

            - id: candidate-service
              uri: ${CANDIDATE_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/candidates/**
              filters:
                - StripPrefix=1

            - id: interview-service
              uri: ${INTERVIEW_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/api/interviews/**
              filters:
                - StripPrefix=1

            - id: subscription-service
              uri: ${SUBSCRIPTION_SERVICE_URL:http://localhost:8086}
              predicates:
                - Path=/api/subscriptions/**
              filters:
                - StripPrefix=1

            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
              predicates:
                - Path=/api/notifications/**
              filters:
                - StripPrefix=1

            - id: file-service
              uri: ${FILE_SERVICE_URL:http://localhost:8088}
              predicates:
                - Path=/api/files/**
              filters:
                - StripPrefix=1

            - id: report-service
              uri: ${REPORT_SERVICE_URL:http://localhost:8089}
              predicates:
                - Path=/api/reports/**
              filters:
                - StripPrefix=1

          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

