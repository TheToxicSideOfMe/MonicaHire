spring.application.name=report-service
server.port=8089

# Database
spring.datasource.url=${REPORT_DB_URL:jdbc:postgresql://localhost:5435/report_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=report-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Service URLs
subscription-service.base-url=${SUBSCRIPTION_SERVICE_URL:http://localhost:8086}
candidate-service.base-url=${CANDIDATE_SERVICE_URL:http://localhost:8084}
monica-ai.base-url=${MONICA_AI_URL:http://localhost:8000}
file-service.base-url=${FILE_SERVICE_URL:http://localhost:8088}