spring.application.name=candidate-service
server.port=8084

# Database
spring.datasource.url=jdbc:postgresql://localhost:5435/candidate_db
spring.datasource.username=monicahire
spring.datasource.password=monicahire_secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

job-service.base-url=http://localhost:8083
interview-service.base-url=http://localhost:8085
monica-ai.base-url=http://localhost:8000